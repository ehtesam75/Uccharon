{% load static %}
    <!-- Delete Account Confirmation Modal -->
    <div id="delete-account-overlay" class="modal-overlay" style="display:none">
        <div class="modal-content delete-account-modal-content" role="alertdialog" aria-modal="true"
            aria-labelledby="delete-account-title" aria-describedby="delete-account-desc">
            <div class="delete-account-icon" aria-hidden="true">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                    <line x1="10" y1="11" x2="10" y2="17" />
                    <line x1="14" y1="11" x2="14" y2="17" />
                </svg>
            </div>
            <h2 id="delete-account-title">Delete Account</h2>
            <p id="delete-account-desc" class="modal-desc">
                Are you sure you want to delete your account? This action cannot be undone. All your conversations,
                learning history, settings, and account data will be permanently deleted.
            </p>
            <div class="delete-account-actions">
                <button id="cancel-delete-account-btn" type="button" class="auth-btn secondary-btn">
                    <span>Cancel</span>
                </button>
                <button id="confirm-delete-account-btn" type="button" class="auth-btn danger-btn">
                    <span>Delete Account</span>
                </button>
            </div>
        </div>
    </div>
