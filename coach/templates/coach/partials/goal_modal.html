{% load static %}
    <!-- Goal Selection Modal -->
    <div id="goal-modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal-content goal-modal-content">
            <h2>Set Your Daily Goal</h2>
            <p class="modal-desc" style="margin-bottom: 20px; color: var(--text-secondary);">Choose a daily word target
                to build a consistent learning habit. You can change this later in Settings.</p>

            <div class="goal-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <label class="goal-option">
                    <input type="radio" name="onboarding-goal" value="100" checked style="display:none;">
                    <div class="goal-card"
                        style="border: 2px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s;">
                        <span class="goal-num"
                            style="display: block; font-size: 1.5rem; font-weight: bold; color: var(--text-primary);">100</span>
                        <span class="goal-text"
                            style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">words/day</span>
                        <span class="goal-remark"
                            style="display: block; font-size: 0.72rem; color: var(--text-tertiary);">Light Practice</span>
                    </div>
                </label>
                <label class="goal-option">
                    <input type="radio" name="onboarding-goal" value="250" style="display:none;">
                    <div class="goal-card"
                        style="border: 2px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s;">
                        <span class="goal-num"
                            style="display: block; font-size: 1.5rem; font-weight: bold; color: var(--text-primary);">250</span>
                        <span class="goal-text"
                            style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">words/day</span>
                        <span class="goal-remark"
                            style="display: block; font-size: 0.72rem; color: var(--text-tertiary);">Recommended</span>
                    </div>
                </label>
                <label class="goal-option">
                    <input type="radio" name="onboarding-goal" value="500" style="display:none;">
                    <div class="goal-card"
                        style="border: 2px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s;">
                        <span class="goal-num"
                            style="display: block; font-size: 1.5rem; font-weight: bold; color: var(--text-primary);">500</span>
                        <span class="goal-text"
                            style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">words/day</span>
                        <span class="goal-remark"
                            style="display: block; font-size: 0.72rem; color: var(--text-tertiary);">Serious Learner</span>
                    </div>
                </label>
                <label class="goal-option">
                    <input type="radio" name="onboarding-goal" value="1000" style="display:none;">
                    <div class="goal-card"
                        style="border: 2px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s;">
                        <span class="goal-num"
                            style="display: block; font-size: 1.5rem; font-weight: bold; color: var(--text-primary);">1000+</span>
                        <span class="goal-text"
                            style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">words/day</span>
                        <span class="goal-remark"
                            style="display: block; font-size: 0.72rem; color: var(--text-tertiary);">Intensive Practice</span>
                    </div>
                </label>
            </div>

            <button id="save-onboarding-goal-btn" class="auth-btn primary-btn" style="margin-top:24px;">
                <span>Start Learning</span>
            </button>
        </div>
    </div>
